[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kiji-inspector"
version = "0.1.0"
description = "Kiji Inspector"
readme = "README.md"
requires-python = ">=3.13,<3.14"
license = {text = "Apache 2.0"}
authors = [
    {name = "575 Lab - Dataiku's Open Source Office", email = "opensource@dataiku.com"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "torch>=2.9.1",
    "torchvision",
    "vllm>=0.11.0",
    "numpy>=1.26.0",
    "tqdm>=4.66.0",
    "pyarrow>=15.0.0",
    "rich>=13.0.0",
    "streamlit>=1.30.0",
    "pandas>=2.0.0",
    "scipy>=1.11.0",
    "scikit-learn>=1.3.0",
    "datasets>=3.0.0",
    # Mamba/NemotronH deps — need source build on aarch64, install manually if needed:
    # uv pip install flash-linear-attention causal-conv1d mamba-ssm --no-build-isolation
    "accelerate>=1.12.0",
    "transformers>=4.57.6",
]

[project.optional-dependencies]
hf = [
    "datasets>=2.0",
    "huggingface-hub>=0.20",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ["py313"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.uv]
environments = ["sys_platform == 'linux' and platform_machine == 'x86_64'", "sys_platform == 'linux' and platform_machine == 'aarch64'", "sys_platform == 'darwin'"]

# Override vllm's torch==2.10.0+cpu requirement — we use the CUDA build from pytorch-cu130
override-dependencies = [
    "torch>=2.10.0",
]

# Build these CUDA-dependent packages against the installed CUDA torch
# (not the CPU torch that build isolation would pull from PyPI)
no-build-isolation-package = ["causal-conv1d", "mamba-ssm", "flash-linear-attention"]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu130", marker = "sys_platform == 'linux'" },
]
torchvision = [
  { index = "pytorch-cu130", marker = "sys_platform == 'linux'" },
]
torchaudio = [
  { index = "pytorch-cu130", marker = "sys_platform == 'linux'" },
]
vllm = { path = "../vllm", editable = true }
