name: Lint and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  runtime:
    runs-on: ubuntu-latest
    name: Runtime checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install runtime + dev dependencies
        run: uv sync --extra dev

      - name: Run ruff linter
        run: uv run ruff check src tests

      - name: Run ruff formatter check
        run: uv run ruff format --check src tests

      - name: Run runtime tests
        run: uv run pytest tests/test_runtime_api.py

      - name: Base install smoke
        run: uv run python -c "from kiji_inspector import SAE; from kiji_inspector.sae_core import JumpReLUSAE"

      - name: Build package
        run: uv build

  train-smoke:
    runs-on: ubuntu-latest
    name: Train extra smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install train + dev dependencies
        run: uv sync --extra train --extra dev

      - name: Run train namespace smoke tests
        run: uv run pytest tests/test_train_smoke.py
